<svg viewBox="0 0 450 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Pin icon -->
  <g id="pin">
    <circle cx="30" cy="35" r="18" fill="#1a2744" stroke="none"/>
    <circle cx="30" cy="35" r="10" fill="white"/>
    <path d="M 30 55 L 22 75 L 38 75 Z" fill="#1a2744"/>
    
    <!-- Arrow -->
    <line x1="42" y1="18" x2="58" y2="4" stroke="#e8960a" stroke-width="4" stroke-linecap="round"/>
    <polygon points="58,4 65,12 55,15" fill="#e8960a"/>
    
    <!-- Chart bars -->
    <rect x="45" y="48" width="6" height="12" fill="#e8960a" rx="1"/>
    <rect x="54" y="42" width="6" height="18" fill="#e8960a" rx="1"/>
    <rect x="63" y="46" width="6" height="14" fill="#e8960a" rx="1"/>
    
    <!-- Dots -->
    <circle cx="25" cy="58" r="3" fill="#e8960a"/>
    <circle cx="42" cy="42" r="2.5" fill="#e8960a"/>
  </g>

  <!-- Text: OutreachRoute -->
  <text x="85" y="50" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#1a2744" letter-spacing="-1">
    OutreachRoute
  </text>
  
  <!-- Text: Pro badge -->
  <rect x="350" y="28" width="70" height="28" fill="#e8960a" rx="4"/>
  <text x="385" y="48" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">
    Pro
  </text>
</svg>
